name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - run: go build ./...
      - run: go vet ./...
      - name: Run unit tests
        run: go test -short ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  conformance:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Start Streamline server
        run: docker compose -f docker-compose.test.yml up -d --wait

      - name: Wait for health check
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9094/health > /dev/null 2>&1; then
              echo "Streamline is healthy"
              exit 0
            fi
            echo "Waiting for Streamline... ($i/30)"
            sleep 2
          done
          echo "Streamline failed to start"
          docker compose -f docker-compose.test.yml logs
          exit 1

      - name: Run conformance tests
        run: go test -v -run 'Test[PCGADSEF]' -timeout 120s ./...

      - name: Stop Streamline server
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
